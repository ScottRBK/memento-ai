line-length = 88
target-version = "py312"

[lint]
# Incremental approach: start with rules we pass, add more as we fix.
# Groups are ordered by ruff documentation category.
select = [
    # --- Already passing (Tier 1) ---
    "F",       # Pyflakes — unused imports, undefined names
    "I",       # isort — import ordering
    "Q",       # flake8-quotes — consistent quoting
    "COM",     # flake8-commas — trailing commas
    "C4",      # flake8-comprehensions — unnecessary list/dict calls
    "ISC",     # flake8-implicit-str-concat — implicit string concatenation
    "ICN",     # flake8-import-conventions — import alias conventions
    "PIE",     # flake8-pie — misc lints (no-unnecessary-pass, etc.)
    "PGH",     # pygrep-hooks — blanket type: ignore, eval usage
    "TID",     # flake8-tidy-imports — banned imports, relative imports
    "YTT",     # flake8-2020 — sys.version misuse
    "FA",      # flake8-future-annotations — future annotations
    "LOG",     # flake8-logging — logging module misuse
    "T10",     # flake8-debugger — debugger breakpoints
    "UP",      # pyupgrade — Python 3.12+ syntax (built-in generics, etc.)

    # --- Next targets (low error count, fix and enable) ---
    # "A",     # flake8-builtins — 4 errors (shadowing builtins)
    # "N",     # pep8-naming — 9 errors
    # "PERF",  # perflint — 2 errors
    # "DTZ",   # flake8-datetimez — 2 errors (naive datetimes)
    # "FURB",  # refurb — 1 error
    # "RSE",   # flake8-raise — 1 error
    # "TC",    # flake8-type-checking — 1 error
    # "SIM",   # flake8-simplify — 14 errors
    # "ASYNC", # flake8-async — 9 errors

    # --- Medium effort ---
    # "W",     # pycodestyle warnings — 39 errors (whitespace)
    # "ERA",   # eradicate — 21 errors (commented-out code)
    "S",       # flake8-bandit — security checks (S105/S106 ignored in tests)
    # "PT",    # flake8-pytest-style — 66 errors
    # "ARG",   # flake8-unused-arguments — 72 errors
    # "RET",   # flake8-return — 56 errors
    # "RUF",   # ruff-specific — 126 errors

    # --- Large effort ---
    # "E",     # pycodestyle errors — 1715 errors (mostly E501 line length)
    # "D",     # pydocstyle — 1763 errors (docstring formatting)
    # "ANN",   # flake8-annotations — 337 errors (type annotations)
    # "TRY",   # tryceratops — 443 errors (exception handling)
    # "EM",    # flake8-errmsg — 342 errors (exception messages)
    # "G",     # flake8-logging-format — 253 errors (f-strings in logging)
    # "PLC",   # pylint convention — 225 errors (imports not at top-level)
    # "B",     # flake8-bugbear — 146 errors
    # "BLE",   # flake8-blind-except — 46 errors
    # "FBT",   # flake8-boolean-trap — 71 errors
    # "C90",   # mccabe — 33 errors (complexity)
    # "SLF",   # flake8-self — 37 errors (private member access)
    # "PLR",   # pylint refactor — 51 errors
    # "T20",   # flake8-print — 46 errors
    # "TD",    # flake8-todos — 34 errors
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "F403", "F405"]
"tests/**/*" = ["S101", "S105", "S106", "S110", "S311", "S324"]
"app/config/settings.py" = ["S104", "S105"]  # Default values, not real secrets
"app/repositories/*/memory_repository.py" = ["S608"]  # Parameterized SQL via text()
"app/services/backup_service.py" = ["S603", "S607"]  # Trusted subprocess calls
"app/routes/mcp/scope_resolver.py" = ["S105"]  # Test token constants
"tests/e2e/conftest.py" = ["S603", "S607"]  # Trusted subprocess for test setup

[lint.pydocstyle]
convention = "google"
